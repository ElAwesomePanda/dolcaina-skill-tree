<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Taller de Dolçaina i Tabalet — Arbre de Fites</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

:root {
  --bg: #0e0c08;
  --bg2: #171410;
  --gold: #c9a84c;
  --gold-light: #e8c87a;
  --gold-dim: #7a6430;
  --cream: #f0e6cc;
  --cream-dim: #9a8e78;
  --locked: #1a1815;
  --locked-border: #2a2520;
  --locked-text: #4a4438;
  --green: #4a8c5c;
  --green-dim: #3d6b4a;
  --node-w: 200;
  --node-h: 110;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'Crimson Pro', Georgia, serif;
  min-height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Grain */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 999;
  opacity: 0.5;
}

/* Fixed top UI */
.top-ui {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid #2a2518;
}

header {
  text-align: center;
  padding: 20px 24px 16px;
  position: relative;
}
header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.header-eyebrow {
  font-size: 0.65rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 6px;
}
h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.1rem, 3vw, 1.8rem);
  font-weight: 700;
  color: var(--gold-light);
  letter-spacing: 0.05em;
}
.header-sub {
  color: var(--cream-dim);
  font-size: 0.85rem;
  font-style: italic;
}

.controls-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  border-top: 1px solid #1e1c17;
  flex-wrap: wrap;
}

.discourse-label {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gold-dim);
  white-space: nowrap;
}
.discourse-input {
  background: var(--bg);
  border: 1px solid #3a3428;
  color: var(--cream);
  font-family: 'Crimson Pro', serif;
  font-size: 0.85rem;
  padding: 4px 10px;
  border-radius: 3px;
  width: 150px;
}
.discourse-input:focus { outline: none; border-color: var(--gold-dim); }

.ctrl-btn {
  font-family: 'Cinzel', serif;
  font-size: 0.58rem;
  letter-spacing: 0.08em;
  padding: 4px 10px;
  border: 1px solid var(--gold-dim);
  background: transparent;
  color: var(--gold);
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
  white-space: nowrap;
}
.ctrl-btn:hover { background: rgba(201,168,76,0.1); }
.ctrl-btn-danger { border-color: #6b3a3a; color: #c47a7a; }
.ctrl-btn-danger:hover { background: rgba(140,74,74,0.12); border-color: #8c4a4a; }

.discourse-status {
  font-size: 0.7rem;
  font-style: italic;
  color: var(--cream-dim);
}
.discourse-status.ok { color: var(--green); }
.discourse-status.err { color: #8c4a4a; }

.progress-bar-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 6px 16px;
  border-top: 1px solid #1e1c17;
}
.progress-label {
  font-family: 'Cinzel', serif;
  font-size: 0.58rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gold-dim);
  white-space: nowrap;
}
.progress-bar {
  flex: 1; height: 2px;
  background: #2a2518;
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold));
  transition: width 0.5s ease;
}
.progress-pct {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  color: var(--gold);
}

.legend {
  display: flex;
  gap: 16px;
  padding: 5px 16px;
  border-top: 1px solid #1e1c17;
  font-size: 0.7rem;
  color: var(--cream-dim);
  align-items: center;
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }
.dot-completed { background: var(--green); }
.dot-unlocked { background: var(--gold); }
.dot-locked { background: #2a2520; border: 1px solid #3a3430; }

.footer-credit {
  position: fixed;
  bottom: 8px; right: 12px;
  font-size: 0.6rem;
  color: #3a3428;
  letter-spacing: 0.1em;
  z-index: 100;
  pointer-events: none;
}

/* SVG canvas */
#canvas {
  flex: 1;
  width: 100%;
  cursor: grab;
}
#canvas:active { cursor: grabbing; }

/* Node foreign objects */
.node-card {
  width: 100%;
  height: 100%;
  background: var(--bg2);
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  padding: 10px;
  cursor: pointer;
  position: relative;
  transition: border-color 0.2s, box-shadow 0.2s;
  display: flex;
  flex-direction: column;
  gap: 4px;
  overflow: hidden;
}
.node-card:hover {
  border-color: var(--gold);
  box-shadow: 0 4px 20px rgba(201,168,76,0.15);
}
.node-card.locked {
  background: var(--locked);
  border-color: var(--locked-border);
  cursor: default;
}
.node-card.locked:hover { border-color: var(--locked-border); box-shadow: none; }
.node-card.completed { background: #0d1710; border-color: var(--green-dim); }
.node-card.completed:hover { border-color: var(--green); box-shadow: 0 4px 20px rgba(74,140,92,0.12); }

.node-card::before {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 7px; height: 7px;
  border-top: 1px solid var(--gold-dim);
  border-left: 1px solid var(--gold-dim);
}
.node-card.locked::before { border-color: var(--locked-border); }
.node-card.completed::before { border-color: var(--green-dim); }

.nc-id {
  font-family: 'Cinzel', serif;
  font-size: 0.52rem;
  letter-spacing: 0.1em;
  color: var(--gold-dim);
}
.node-card.locked .nc-id { color: var(--locked-text); }

.nc-title {
  font-family: 'Cinzel', serif;
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--cream);
  line-height: 1.3;
  flex: 1;
}
.node-card.locked .nc-title { color: var(--locked-text); }
.node-card.completed .nc-title { color: #7ac492; }

.nc-badge {
  font-size: 0.58rem;
  color: var(--gold-dim);
  font-style: italic;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.node-card.locked .nc-badge { color: var(--locked-text); }

.nc-status {
  font-family: 'Cinzel', serif;
  font-size: 0.5rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 2px;
}
.nc-status.unlocked { color: var(--gold-dim); }
.nc-status.locked { color: var(--locked-text); }
.nc-status.completed { color: var(--green); }

.nc-lock {
  position: absolute;
  top: 8px; right: 8px;
  font-size: 10px;
  opacity: 0.3;
}
.nc-check {
  position: absolute;
  top: 7px; right: 8px;
  font-size: 11px;
  color: var(--green);
}

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  max-width: 620px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  padding: 28px;
  position: relative;
  transform: translateY(16px);
  transition: transform 0.2s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.modal-close {
  position: absolute;
  top: 14px; right: 14px;
  background: none; border: none;
  color: var(--cream-dim);
  font-size: 1.1rem;
  cursor: pointer;
}
.modal-close:hover { color: var(--cream); }
.modal-eyebrow {
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 6px;
  font-family: 'Cinzel', serif;
}
.modal-title {
  font-family: 'Cinzel', serif;
  font-size: 1.1rem;
  color: var(--gold-light);
  margin-bottom: 12px;
  line-height: 1.3;
}
.modal-desc {
  color: var(--cream-dim);
  font-size: 0.95rem;
  line-height: 1.7;
  margin-bottom: 20px;
  font-style: italic;
}
.modal-section {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 10px;
  padding-bottom: 5px;
  border-bottom: 1px solid #2a2518;
}
.modal-badge-wrap {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px;
  background: rgba(201,168,76,0.04);
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 3px;
  margin-bottom: 20px;
}
.modal-badge-svg { width: 44px; height: 44px; flex-shrink: 0; }
.modal-badge-name {
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  color: var(--gold);
  display: block;
  margin-bottom: 3px;
}
.modal-badge-desc { color: var(--cream-dim); font-size: 0.8rem; font-style: italic; }
.material-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
.material-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  border: 1px solid #2a2518;
  border-radius: 3px;
  text-decoration: none;
  color: var(--cream);
  font-size: 0.82rem;
  transition: all 0.2s;
}
.material-item:hover { border-color: var(--gold-dim); background: rgba(201,168,76,0.04); }
.mat-icon { font-size: 0.95rem; width: 18px; text-align: center; }
.mat-name { flex: 1; }
.mat-type {
  font-size: 0.58rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold-dim);
  font-family: 'Cinzel', serif;
}
.modal-complete-btn {
  width: 100%;
  padding: 12px;
  background: transparent;
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 3px;
  transition: all 0.25s;
}
.modal-complete-btn:hover { background: rgba(201,168,76,0.08); border-color: var(--gold); }
.modal-complete-btn.done { border-color: var(--green-dim); color: var(--green); }
.modal-complete-btn.done:hover { background: rgba(74,140,92,0.06); }

.modal-discourse-link {
  display: block;
  color: var(--gold-dim);
  font-family: 'Cinzel', serif;
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-decoration: none;
  margin-bottom: 16px;
  transition: color 0.2s;
}
.modal-discourse-link:hover { color: var(--gold); }

/* Video embed */
.video-title {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 6px;
}
.video-wrapper {
  margin-bottom: 8px;
  border-radius: 3px;
  overflow: hidden;
  border: 1px solid #2a2518;
  background: #000;
}
.video-wrapper iframe {
  width: 100%;
  aspect-ratio: 16/9;
  height: auto;
  display: block;
  border: none;
}

/* Metrònom */
.metronom-panel {
  position: fixed;
  bottom: 24px; right: 16px;
  z-index: 200;
  background: var(--bg2);
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  width: 230px;
  display: none;
  flex-direction: column;
}
.metronom-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.metronom-panel.open { display: flex; }
.metronom-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px 8px;
  border-bottom: 1px solid #2a2518;
}
.metronom-panel-title {
  font-family: 'Cinzel', serif;
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold-dim);
}
.metronom-close {
  background: none; border: none;
  color: var(--cream-dim); font-size: 1rem;
  cursor: pointer; line-height: 1;
}
.metronom-close:hover { color: var(--cream); }
.metronom-body {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.metronom-label {
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold-dim);
}
.metronom-bpm-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.metronom-bpm-input {
  background: var(--bg);
  border: 1px solid #3a3428;
  color: var(--cream);
  font-family: 'Cinzel', serif;
  font-size: 1.1rem;
  width: 68px;
  text-align: center;
  padding: 3px 6px;
  border-radius: 3px;
}
.metronom-bpm-input:focus { outline: none; border-color: var(--gold-dim); }
.metronom-slider {
  width: 100%;
  accent-color: var(--gold);
  cursor: pointer;
}
.metronom-timer-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.metronom-select {
  background: var(--bg);
  border: 1px solid #3a3428;
  color: var(--cream);
  font-family: 'Crimson Pro', serif;
  font-size: 0.82rem;
  padding: 3px 8px;
  border-radius: 3px;
}
.metronom-select:focus { outline: none; border-color: var(--gold-dim); }
.metronom-beat-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.metronom-beat {
  width: 13px; height: 13px;
  border-radius: 50%;
  background: #2a2518;
  border: 1px solid #3a3428;
  flex-shrink: 0;
  transition: background 0.04s, border-color 0.04s;
}
.metronom-beat.on-down { background: var(--gold-light); border-color: var(--gold-light); }
.metronom-beat.on { background: var(--gold-dim); border-color: var(--gold-dim); }
.metronom-countdown {
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  color: var(--cream-dim);
  letter-spacing: 0.05em;
}
.metronom-start-btn {
  font-family: 'Cinzel', serif;
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  padding: 9px;
  border: 1px solid var(--gold-dim);
  background: transparent;
  color: var(--gold);
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
}
.metronom-start-btn:hover { background: rgba(201,168,76,0.1); }
.metronom-start-btn.running { border-color: #8c4a4a; color: #c47a7a; }
.metronom-start-btn.running:hover { background: rgba(140,74,74,0.1); }

/* Zoom controls */
.zoom-controls {
  position: fixed;
  bottom: 24px; left: 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 100;
}
.zoom-btn {
  width: 32px; height: 32px;
  background: var(--bg2);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  font-size: 1rem;
  cursor: pointer;
  border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.zoom-btn:hover { background: rgba(201,168,76,0.1); }

/* Jump to last unlocked */
.jump-btn {
  position: fixed;
  bottom: 24px; left: 60px;
  z-index: 100;
}
</style>
</head>
<body>

<div class="top-ui">
  <header>
    <div class="header-eyebrow">Ateneu / L'Ardada · Taller de Percussió</div>
    <h1>Arbre de Fites</h1>
    <div class="header-sub">Dolçaina i Tabalet · Itinerari formatiu</div>
  </header>
  <div class="controls-bar">
    <span class="discourse-label">Usuari L'Ardada</span>
    <input class="discourse-input" type="text" id="discourseUser" placeholder="el teu username..." />
    <button class="ctrl-btn" onclick="syncDiscourse()">Sincronitzar fites</button>
    <span class="discourse-status" id="discourseStatus"></span>
    <div style="flex:1"></div>
    <button class="ctrl-btn" onclick="jumpToLastUnlocked()">▶ Últim node</button>
    <button class="ctrl-btn" onclick="toggleMetronom()">♩ Mètronom</button>
    <button class="ctrl-btn ctrl-btn-danger" onclick="resetNodes()">↺ Reset</button>
  </div>
  <div class="progress-bar-wrap">
    <span class="progress-label">Progrés</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <span class="progress-pct" id="progressPct">0%</span>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-completed"></div> Completat</div>
    <div class="legend-item"><div class="legend-dot dot-unlocked"></div> Disponible</div>
    <div class="legend-item"><div class="legend-dot dot-locked"></div> Bloquejat</div>
  </div>
</div>

<svg id="canvas"></svg>

<div class="zoom-controls">
  <button class="zoom-btn" onclick="zoomIn()">+</button>
  <button class="zoom-btn" onclick="zoomOut()">−</button>
  <button class="zoom-btn" onclick="zoomReset()" title="Reset">⌂</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-eyebrow" id="modalId"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-desc" id="modalDesc"></div>
    <div class="modal-section" id="modalFitaSection">Fita</div>
    <div class="modal-badge-wrap" id="modalBadge"></div>
    <div class="modal-section">Material didàctic</div>
    <a class="modal-discourse-link" id="modalDiscourseLink" href="#" target="_blank">Veure al fòrum de L'Ardada →</a>
    <div class="material-list" id="modalMaterials"></div>
    <button class="modal-complete-btn" id="modalCompleteBtn" onclick="toggleComplete()"></button>
  </div>
</div>

<!-- Metrònom -->
<div class="metronom-panel" id="metronomPanel">
  <div class="metronom-header">
    <span class="metronom-panel-title">♩ Mètronom</span>
    <button class="metronom-close" onclick="toggleMetronom()">✕</button>
  </div>
  <div class="metronom-body">
    <div class="metronom-bpm-row">
      <span class="metronom-label">BPM</span>
      <input class="metronom-bpm-input" type="number" id="metroBpmNum" value="80" min="40" max="240">
    </div>
    <input class="metronom-slider" type="range" id="metroBpmRange" min="40" max="240" value="80">
    <div class="metronom-timer-row">
      <span class="metronom-label">Timer</span>
      <select class="metronom-select" id="metroTimer">
        <option value="0">Lliure</option>
        <option value="60">1 min</option>
        <option value="120">2 min</option>
        <option value="180">3 min</option>
        <option value="240">4 min</option>
        <option value="300">5 min</option>
      </select>
    </div>
    <div class="metronom-beat-row">
      <div class="metronom-beat" id="metroBeat"></div>
      <span class="metronom-countdown" id="metroCountdown"></span>
    </div>
    <button class="metronom-start-btn" id="metroStartBtn" onclick="startStopMetronom()">▶ Iniciar</button>
  </div>
</div>

<div class="footer-credit">Desenvolupat per Guillem Reig</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

// NODES s'omple des de nodes.json en init
let NODES = [];

// ─── DISCOURSE ───────────────────────────────────────────────────────────────
const DISCOURSE_URL = 'https://ardada.discoursehosting.net';
const PROXY_URL = 'https://dolcaina-discourse-proxy.guillem-reig-m.workers.dev';
// Construït dinàmicament des de nodes.json després de carregar
let discourseBadgeMap = {};

// ─── STATE ───────────────────────────────────────────────────────────────────
const STATE_KEY = 'dolcaina_completed';
const USER_KEY = 'dolcaina_discourse_user';
let completed = new Set(JSON.parse(localStorage.getItem(STATE_KEY) || '[]'));
let discourseUser = localStorage.getItem(USER_KEY) || '';
let currentNode = null;

function saveState() { localStorage.setItem(STATE_KEY, JSON.stringify([...completed])); }
function isUnlocked(node) { return node.prerequisits.every(p => completed.has(p)); }
function getCompletionPct() { return Math.round((completed.size / NODES.length) * 100); }

// ─── SUGIYAMA LAYOUT ─────────────────────────────────────────────────────────
const NODE_W = 200, NODE_H = 110, H_GAP = 50, V_GAP = 80;

function computeLayout() {
  // 1. Assign layers (longest path from root = bottom layer 0)
  const nodeMap = {};
  NODES.forEach(n => nodeMap[n.id] = { ...n, layer: -1, pos: 0 });

  function getLayer(id) {
    const n = nodeMap[id];
    if (n.layer >= 0) return n.layer;
    if (n.prerequisits.length === 0) { n.layer = 0; return 0; }
    n.layer = Math.max(...n.prerequisits.map(p => getLayer(p))) + 1;
    return n.layer;
  }
  NODES.forEach(n => getLayer(n.id));

  // 2. Group by layer
  const layers = {};
  Object.values(nodeMap).forEach(n => {
    if (!layers[n.layer]) layers[n.layer] = [];
    layers[n.layer].push(n);
  });

  // 3. Order within each layer to minimize crossings (simple heuristic: sort by mean parent x)
  const maxLayer = Math.max(...Object.keys(layers).map(Number));
  for (let l = 1; l <= maxLayer; l++) {
    if (!layers[l]) continue;
    layers[l].forEach(n => {
      const parentXs = n.prerequisits
        .map(pid => nodeMap[pid])
        .filter(Boolean)
        .map(p => p.pos);
      n._sortKey = parentXs.length ? parentXs.reduce((a,b)=>a+b,0)/parentXs.length : 0;
    });
    layers[l].sort((a,b) => a._sortKey - b._sortKey);
    layers[l].forEach((n, i) => n.pos = i);
  }

  // 4. Assign x,y — bottom to top (layer 0 at bottom)
  const layerWidths = {};
  Object.keys(layers).forEach(l => { layerWidths[l] = layers[l].length; });
  const maxWidth = Math.max(...Object.values(layerWidths));
  const totalHeight = (maxLayer + 1) * (NODE_H + V_GAP);

  Object.keys(layers).forEach(l => {
    const layer = layers[l];
    const totalW = layer.length * NODE_W + (layer.length - 1) * H_GAP;
    const startX = -totalW / 2;
    layer.forEach((n, i) => {
      n.x = startX + i * (NODE_W + H_GAP);
      // bottom to top: layer 0 at bottom
      n.y = -(parseInt(l) * (NODE_H + V_GAP));
    });
  });

  return nodeMap;
}

// ─── BADGE SVGS ──────────────────────────────────────────────────────────────
function badgeSVG(type, size=40) {
  const svgs = {
    shield:`<svg width="${size}" height="${size}" viewBox="0 0 48 48" fill="none"><path d="M24 4L8 10v14c0 9 7 16 16 20 9-4 16-11 16-20V10L24 4z" stroke="#c9a84c" stroke-width="1.5" fill="rgba(201,168,76,0.08)"/><path d="M18 24l4 4 8-8" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/></svg>`,
    star:`<svg width="${size}" height="${size}" viewBox="0 0 48 48" fill="none"><path d="M24 6l4.5 9 10 1.5-7.2 7 1.7 10L24 29l-9 4.5 1.7-10L9.5 16.5l10-1.5L24 6z" stroke="#c9a84c" stroke-width="1.5" fill="rgba(201,168,76,0.08)"/></svg>`,
    star2:`<svg width="${size}" height="${size}" viewBox="0 0 48 48" fill="none"><path d="M24 6l4.5 9 10 1.5-7.2 7 1.7 10L24 29l-9 4.5 1.7-10L9.5 16.5l10-1.5L24 6z" stroke="#c9a84c" stroke-width="1.5" fill="rgba(201,168,76,0.12)"/><path d="M24 13l2.8 5.5 6.2.9-4.5 4.4 1.1 6.2L24 27l-5.6 2.9 1.1-6.2L15 19.4l6.2-.9L24 13z" fill="rgba(201,168,76,0.2)" stroke="#c9a84c" stroke-width="0.8"/></svg>`,
    crown:`<svg width="${size}" height="${size}" viewBox="0 0 48 48" fill="none"><path d="M8 34h32M8 34l4-18 8 10 4-14 4 14 8-10 4 18" stroke="#e8c87a" stroke-width="1.5" stroke-linejoin="round" fill="rgba(232,200,122,0.1)"/><circle cx="24" cy="12" r="2" fill="#e8c87a"/><circle cx="8" cy="16" r="2" fill="#c9a84c"/><circle cx="40" cy="16" r="2" fill="#c9a84c"/></svg>`,
  };
  return svgs[type] || svgs.shield;
}

// ─── D3 RENDER ───────────────────────────────────────────────────────────────
let svg, g, zoomBehavior, nodeMap;

function render() {
  nodeMap = computeLayout();

  const svgEl = document.getElementById('canvas');
  const W = window.innerWidth;
  const H = window.innerHeight;

  // Compute top-ui height
  const topUI = document.querySelector('.top-ui');
  const topH = topUI ? topUI.getBoundingClientRect().height : 160;
  svgEl.style.marginTop = topH + 'px';
  svgEl.style.height = (H - topH) + 'px';

  d3.select(svgEl).selectAll('*').remove();

  svg = d3.select(svgEl)
    .attr('width', W)
    .attr('height', H - topH);

  // Defs: arrowhead
  const defs = svg.append('defs');
  defs.append('marker')
    .attr('id', 'arrow-locked')
    .attr('viewBox', '0 0 10 10')
    .attr('refX', 5).attr('refY', 5)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto-start-reverse')
    .append('path').attr('d', 'M 0 0 L 10 5 L 0 10 z').attr('fill', '#2a2520');

  defs.append('marker')
    .attr('id', 'arrow-unlocked')
    .attr('viewBox', '0 0 10 10')
    .attr('refX', 5).attr('refY', 5)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto-start-reverse')
    .append('path').attr('d', 'M 0 0 L 10 5 L 0 10 z').attr('fill', '#7a6430');

  defs.append('marker')
    .attr('id', 'arrow-completed')
    .attr('viewBox', '0 0 10 10')
    .attr('refX', 5).attr('refY', 5)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto-start-reverse')
    .append('path').attr('d', 'M 0 0 L 10 5 L 0 10 z').attr('fill', '#3d6b4a');

  g = svg.append('g');

  zoomBehavior = d3.zoom()
    .scaleExtent([0.2, 3])
    .on('zoom', (event) => {
      g.attr('transform', event.transform);
    });

  svg.call(zoomBehavior);

  // Draw edges
  const nodes = Object.values(nodeMap);
  nodes.forEach(target => {
    target.prerequisits.forEach(srcId => {
      const src = nodeMap[srcId];
      if (!src) return;

      const srcDone = completed.has(src.id);
      const tgtDone = completed.has(target.id);
      const edgeDone = srcDone && tgtDone;
      const edgeUnlocked = srcDone;

      const x1 = src.x + NODE_W / 2;
      const y1 = src.y; // top of source (remember y increases downward in SVG, but we flip)
      const x2 = target.x + NODE_W / 2;
      const y2 = target.y + NODE_H;

      const color = edgeDone ? '#3d6b4a' : edgeUnlocked ? '#7a6430' : '#2a2520';
      const arrowId = edgeDone ? 'arrow-completed' : edgeUnlocked ? 'arrow-unlocked' : 'arrow-locked';

      g.append('path')
        .attr('d', `M${x1},${y1} C${x1},${(y1+y2)/2} ${x2},${(y1+y2)/2} ${x2},${y2}`)
        .attr('fill', 'none')
        .attr('stroke', color)
        .attr('stroke-width', edgeDone ? 1.5 : 1)
        .attr('marker-end', `url(#${arrowId})`);
    });
  });

  // Draw nodes as foreignObject
  nodes.forEach(n => {
    const unlocked = isUnlocked(n);
    const done = completed.has(n.id);

    const fo = g.append('foreignObject')
      .attr('x', n.x)
      .attr('y', n.y)
      .attr('width', NODE_W)
      .attr('height', NODE_H);

    const div = fo.append('xhtml:div')
      .attr('class', 'node-card' + (done ? ' completed' : !unlocked ? ' locked' : ''))
      .attr('xmlns', 'http://www.w3.org/1999/xhtml');

    if (!unlocked && !done) {
      div.append('xhtml:span').attr('class', 'nc-lock').text('🔒');
    }
    if (done) {
      div.append('xhtml:span').attr('class', 'nc-check').text('✓');
    }

    div.append('xhtml:div').attr('class', 'nc-id').text(n.id);
    div.append('xhtml:div').attr('class', 'nc-title').text(n.titol);
    div.append('xhtml:div').attr('class', 'nc-badge').text(n.es_fita && n.fita ? n.fita.icona + ' ' + n.fita.nom : '');
    div.append('xhtml:div').attr('class', 'nc-status ' + (done ? 'completed' : unlocked ? 'unlocked' : 'locked'))
      .text(done ? 'Completat' : unlocked ? 'Disponible' : 'Bloquejat');

    if (unlocked) {
      div.on('click', () => openModal(n.id));
    }
  });

  // Initial transform: center on bottom nodes, flipped (roots at bottom)
  const layer0Nodes = nodes.filter(n => n.prerequisits.length === 0);
  const centerX = layer0Nodes.reduce((s, n) => s + n.x + NODE_W/2, 0) / layer0Nodes.length;
  const centerY = 0; // layer 0 y=0

  const initX = W/2 - centerX;
  const initY = (H - topH) * 0.85 - centerY;

  svg.call(zoomBehavior.transform, d3.zoomIdentity.translate(initX, initY).scale(1));

  updateProgress();
}

// ─── ZOOM ────────────────────────────────────────────────────────────────────
function zoomIn() { svg.transition().call(zoomBehavior.scaleBy, 1.3); }
function zoomOut() { svg.transition().call(zoomBehavior.scaleBy, 0.77); }
function zoomReset() {
  const topH = document.querySelector('.top-ui').getBoundingClientRect().height;
  const W = window.innerWidth, H = window.innerHeight;
  const nodes = Object.values(nodeMap);
  const layer0 = nodes.filter(n => n.prerequisits.length === 0);
  const cx = layer0.reduce((s,n) => s+n.x+NODE_W/2,0)/layer0.length;
  svg.transition().call(zoomBehavior.transform,
    d3.zoomIdentity.translate(W/2 - cx, (H-topH)*0.85).scale(1));
}

function jumpToLastUnlocked() {
  const nodes = Object.values(nodeMap);
  // Find last unlocked but not completed node (frontier)
  let frontier = nodes.filter(n => isUnlocked(n) && !completed.has(n.id));
  if (!frontier.length) frontier = nodes.filter(n => isUnlocked(n));
  if (!frontier.length) return;
  // Pick the one with highest layer
  const target = frontier.reduce((a,b) => (a.layer > b.layer ? a : b));
  const W = window.innerWidth;
  const topH = document.querySelector('.top-ui').getBoundingClientRect().height;
  const H = window.innerHeight;
  const tx = W/2 - (target.x + NODE_W/2);
  const ty = (H-topH)/2 - (target.y + NODE_H/2);
  svg.transition().duration(600).call(zoomBehavior.transform,
    d3.zoomIdentity.translate(tx, ty).scale(1.2));
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(id) {
  const node = NODES.find(n => n.id === id);
  if (!node) return;
  currentNode = node;
  const done = completed.has(id);

  document.getElementById('modalId').textContent = node.id + ' · ' + node.familia;
  document.getElementById('modalTitle').textContent = node.titol;
  document.getElementById('modalDesc').textContent = node.descripcio;

  // Secció fita: només visible si el node és fita
  const fitaSection = document.getElementById('modalFitaSection');
  const fitaBadge = document.getElementById('modalBadge');
  if (node.es_fita && node.fita) {
    fitaSection.style.display = '';
    fitaBadge.style.display = '';
    fitaBadge.innerHTML = `
      <div style="font-size:2.4rem;line-height:1;flex-shrink:0">${node.fita.icona}</div>
      <div><span class="modal-badge-name">${node.fita.nom}</span>
      <span class="modal-badge-desc">${node.fita.descripcio}</span></div>`;
  } else {
    fitaSection.style.display = 'none';
    fitaBadge.style.display = 'none';
  }

  // Link al topic de Discourse
  const discourseLink = document.getElementById('modalDiscourseLink');
  if (node.discourse_topic_id) {
    discourseLink.style.display = '';
    discourseLink.href = `${DISCOURSE_URL}/t/${node.discourse_topic_id}`;
  } else {
    discourseLink.style.display = 'none';
  }

  // Material
  const matList = document.getElementById('modalMaterials');
  matList.innerHTML = '';
  const icons = {pdf:'📄',mp3:'🎵',mp4:'🎬',link:'🔗'};
  node.material.forEach(m => {
    if (m.tipus === 'video') {
      const title = document.createElement('div');
      title.className = 'video-title';
      title.textContent = m.nom;
      matList.appendChild(title);
      const wrapper = document.createElement('div');
      wrapper.className = 'video-wrapper';
      wrapper.innerHTML = m.url;
      matList.appendChild(wrapper);
    } else {
      const a = document.createElement('a');
      a.href = m.url; a.className = 'material-item'; a.target = '_blank';
      a.innerHTML = `<span class="mat-icon">${icons[m.tipus]||'📎'}</span>
        <span class="mat-name">${m.nom}</span>
        <span class="mat-type">${m.tipus.toUpperCase()}</span>`;
      matList.appendChild(a);
    }
  });

  const btn = document.getElementById('modalCompleteBtn');
  btn.textContent = done ? '✓ Marcat com a completat' : 'Marcar com a completat';
  btn.className = 'modal-complete-btn' + (done ? ' done' : '');
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  // Atura el vídeo buidant l'iframe abans de tancar
  document.querySelectorAll('.video-wrapper').forEach(w => { w.innerHTML = ''; });
  document.getElementById('modalOverlay').classList.remove('open');
  currentNode = null;
}
function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}
function getDescendants(id) {
  const result = new Set();
  function traverse(nid) {
    NODES.forEach(n => {
      if (n.prerequisits.includes(nid) && !result.has(n.id)) {
        result.add(n.id);
        traverse(n.id);
      }
    });
  }
  traverse(id);
  return result;
}

function toggleComplete() {
  if (!currentNode) return;
  const id = currentNode.id;
  if (completed.has(id)) {
    completed.delete(id);
    // Desmarcar també tots els descendents
    getDescendants(id).forEach(d => completed.delete(d));
  } else {
    completed.add(id);
  }
  saveState();
  render();
  openModal(id);
}

function resetNodes() {
  if (!confirm('Segur que vols reiniciar tot el progrés? Tots els nodes es marcaran com a no completats.')) return;
  completed.clear();
  saveState();
  render();
}

// ─── PROGRESS ────────────────────────────────────────────────────────────────
function updateProgress() {
  const pct = getCompletionPct();
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
}

// ─── BADGE MAP (dinàmic) ──────────────────────────────────────────────────────

function getAllAncestors(id, nodeMap) {
  const result = new Set();
  function traverse(nid) {
    const n = nodeMap[nid];
    if (!n) return;
    n.prerequisits.forEach(pid => {
      if (!result.has(pid)) { result.add(pid); traverse(pid); }
    });
  }
  traverse(id);
  return [...result];
}

function buildBadgeMap(nodes) {
  const nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);
  const map = {};
  nodes.forEach(n => {
    if (n.es_fita && n.fita && n.fita.discourse_badge_id) {
      const ancestors = getAllAncestors(n.id, nodeMap);
      map[n.fita.discourse_badge_id] = [n.id, ...ancestors];
    }
  });
  return map;
}

// ─── DISCOURSE SYNC ──────────────────────────────────────────────────────────
async function syncDiscourse() {
  const input = document.getElementById('discourseUser').value.trim();
  const status = document.getElementById('discourseStatus');
  if (!input) { status.textContent = 'Introdueix el teu username.'; status.className = 'discourse-status err'; return; }
  status.textContent = 'Sincronitzant...'; status.className = 'discourse-status';
  try {
    const res = await fetch(`${PROXY_URL}?username=${input}`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    const badgeIds = new Set(data.user_badges.map(ub => ub.badge_id));
    let found = 0;
    for (const [badgeId, nodes] of Object.entries(discourseBadgeMap)) {
      if (badgeIds.has(parseInt(badgeId))) { nodes.forEach(n => completed.add(n)); found++; }
    }
    discourseUser = input;
    localStorage.setItem(USER_KEY, discourseUser);
    saveState(); render();
    status.textContent = found > 0 ? `✓ ${found} fita(es) sincronitzada(es)!` : '✓ Connectat. Cap fita de branca encara.';
    status.className = 'discourse-status ok';
  } catch(e) {
    status.textContent = "Error: usuari no trobat a L'Ardada.";
    status.className = 'discourse-status err';
  }
}

// ─── METRÒNOM ────────────────────────────────────────────────────────────────
let metroAudioCtx = null;
let metroRunning = false;
let metroBeatCount = 0;
let metroNextBeatTime = 0;
let metroSchedulerTimeout = null;
let metroTimerEnd = null;
let metroTimerInterval = null;

function toggleMetronom() {
  document.getElementById('metronomPanel').classList.toggle('open');
}

function getMetroBpm() {
  return Math.max(40, Math.min(240, parseInt(document.getElementById('metroBpmNum').value) || 80));
}

function playClick(time, isDownbeat) {
  const osc = metroAudioCtx.createOscillator();
  const gain = metroAudioCtx.createGain();
  osc.connect(gain);
  gain.connect(metroAudioCtx.destination);
  osc.frequency.value = isDownbeat ? 600 : 1000;
  const vol = isDownbeat ? 1.0 : 0.7;
  const dur = isDownbeat ? 0.055 : 0.04;
  gain.gain.setValueAtTime(vol, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
  osc.start(time);
  osc.stop(time + dur);
}

function flashBeat(isDownbeat) {
  const dot = document.getElementById('metroBeat');
  dot.classList.add(isDownbeat ? 'on-down' : 'on');
  setTimeout(() => dot.classList.remove('on-down', 'on'), 80);
}

function metroSchedule() {
  if (!metroRunning) return;
  const beatInterval = 60 / getMetroBpm();
  const scheduleAhead = 0.15;
  while (metroNextBeatTime < metroAudioCtx.currentTime + scheduleAhead) {
    const isDownbeat = metroBeatCount % 4 === 0;
    playClick(metroNextBeatTime, isDownbeat);
    const delay = Math.max(0, (metroNextBeatTime - metroAudioCtx.currentTime) * 1000);
    const captured = isDownbeat;
    setTimeout(() => { if (metroRunning) flashBeat(captured); }, delay);
    metroNextBeatTime += beatInterval;
    metroBeatCount++;
  }
  metroSchedulerTimeout = setTimeout(metroSchedule, 50);
}

function startStopMetronom() {
  metroRunning ? stopMetronom() : startMetronom();
}

function startMetronom() {
  if (!metroAudioCtx) metroAudioCtx = new AudioContext();
  if (metroAudioCtx.state === 'suspended') metroAudioCtx.resume();
  metroRunning = true;
  metroBeatCount = 0;
  metroNextBeatTime = metroAudioCtx.currentTime + 0.05;
  const btn = document.getElementById('metroStartBtn');
  btn.textContent = '■ Parar';
  btn.classList.add('running');
  const secs = parseInt(document.getElementById('metroTimer').value);
  if (secs > 0) {
    metroTimerEnd = Date.now() + secs * 1000;
    updateMetroCountdown();
    metroTimerInterval = setInterval(() => {
      if (!metroRunning) return;
      if (Date.now() >= metroTimerEnd) stopMetronom();
      else updateMetroCountdown();
    }, 250);
  }
  metroSchedule();
}

function stopMetronom() {
  metroRunning = false;
  clearTimeout(metroSchedulerTimeout);
  clearInterval(metroTimerInterval);
  metroTimerEnd = null;
  const btn = document.getElementById('metroStartBtn');
  btn.textContent = '▶ Iniciar';
  btn.classList.remove('running');
  document.getElementById('metroCountdown').textContent = '';
  document.getElementById('metroBeat').classList.remove('on', 'on-down');
}

function updateMetroCountdown() {
  if (!metroTimerEnd) return;
  const rem = Math.max(0, Math.ceil((metroTimerEnd - Date.now()) / 1000));
  const m = Math.floor(rem / 60), s = rem % 60;
  document.getElementById('metroCountdown').textContent = `${m}:${s.toString().padStart(2,'0')}`;
}

document.getElementById('metroBpmRange').addEventListener('input', function() {
  document.getElementById('metroBpmNum').value = this.value;
});
document.getElementById('metroBpmNum').addEventListener('input', function() {
  const v = Math.max(40, Math.min(240, parseInt(this.value) || 80));
  document.getElementById('metroBpmRange').value = v;
});

// ─── INIT ────────────────────────────────────────────────────────────────────
if (discourseUser) document.getElementById('discourseUser').value = discourseUser;
window.addEventListener('resize', () => { if (NODES.length) render(); });

async function init() {
  const canvas = document.getElementById('canvas');
  const topH = document.querySelector('.top-ui').getBoundingClientRect().height;
  canvas.style.marginTop = topH + 'px';
  const loadingMsg = document.createElementNS('http://www.w3.org/2000/svg','text');
  loadingMsg.setAttribute('x','50%'); loadingMsg.setAttribute('y','50%');
  loadingMsg.setAttribute('text-anchor','middle');
  loadingMsg.setAttribute('fill','#7a6430');
  loadingMsg.setAttribute('font-family','Cinzel,serif');
  loadingMsg.setAttribute('font-size','14');
  loadingMsg.textContent = 'Carregant nodes…';
  canvas.appendChild(loadingMsg);

  try {
    const res = await fetch('nodes.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    NODES = await res.json();
    discourseBadgeMap = buildBadgeMap(NODES);
    canvas.removeChild(loadingMsg);
    render();
  } catch(e) {
    loadingMsg.setAttribute('fill','#8c4a4a');
    loadingMsg.textContent = 'Error carregant nodes.json: ' + e.message;
    console.error('Error carregant nodes.json:', e);
  }
}

init();
</script>
